<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V6 — Gradient Bloom</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1024px; height:1024px; overflow:hidden; background:#0A0A0F; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; }
  .icon {
    width:1024px; height:1024px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 40% 35%, rgba(74,144,217,0.20) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 55%, rgba(52,199,89,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 70%, rgba(155,89,182,0.06) 0%, transparent 40%),
      #0A0A0F;
  }
  /* Two overlapping gradient blobs */
  .blob {
    position:absolute; border-radius:50%; z-index:2;
    filter: blur(80px);
  }
  .blob.blue {
    width:400px; height:400px;
    top:180px; left:200px;
    background: rgba(74,144,217,0.15);
  }
  .blob.green {
    width:350px; height:350px;
    top:280px; right:200px;
    background: rgba(52,199,89,0.12);
  }
  /* Chain link — centered, prominent */
  .loop-svg {
    width:380px; height:380px; z-index:10; position:relative;
    filter: drop-shadow(0 0 50px rgba(74,144,217,0.4)) drop-shadow(0 0 100px rgba(52,199,89,0.15));
  }
  /* Glass card behind the link */
  .glass-card {
    position:absolute; z-index:8;
    width:460px; height:460px; border-radius:50%;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 0 60px rgba(74,144,217,0.04);
  }
  /* Wordmark */
  .wordmark {
    position:absolute; bottom:100px; z-index:12;
    font-size:66px; font-weight:900; letter-spacing:-2px;
    background: linear-gradient(135deg, #7BB3FF 0%, #4A90D9 40%, #34C759 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub {
    position:absolute; bottom:62px; z-index:12;
    font-size:13px; font-weight:700; color:rgba(255,255,255,0.18);
    letter-spacing:8px; text-transform:uppercase;
  }
  /* Floating glucose reading — top right */
  .float-reading {
    position:absolute; top:120px; right:120px; z-index:15;
    background:rgba(255,255,255,0.03); border:1px solid rgba(76,175,80,0.15);
    border-radius:18px; padding:14px 20px; text-align:center;
    box-shadow:0 0 20px rgba(76,175,80,0.05);
  }
  .float-reading .val { font-size:32px; font-weight:900; color:#4CAF50; line-height:1; }
  .float-reading .unit { font-size:10px; font-weight:700; color:rgba(255,255,255,0.25); margin-top:4px; letter-spacing:1px; }
  /* Floating trend arrow — bottom right */
  .float-trend {
    position:absolute; bottom:200px; right:130px; z-index:15;
    font-size:40px; color:rgba(76,175,80,0.3);
  }
  /* Floating care circle dots — left side */
  .circle-dots {
    position:absolute; left:100px; top:50%; transform:translateY(-50%); z-index:15;
    display:flex; flex-direction:column; gap:14px;
  }
  .circle-dot {
    width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.1);
    position:relative;
  }
  .circle-dot::after {
    content:''; position:absolute; inset:3px; border-radius:50%;
  }
  .circle-dot.on::after { background:#4CAF50; box-shadow:0 0 8px #4CAF50; }
  .circle-dot.warn::after { background:#FFA500; box-shadow:0 0 8px #FFA500; }
  .circle-dot.off::after { background:rgba(255,255,255,0.15); }
  /* VibeCMD */
  .vibecmd {
    position:absolute; bottom:28px; left:32px; z-index:20;
    display:flex; align-items:center; gap:6px;
  }
  .vibecmd .td { width:6px; height:6px; border-radius:50%; }
  .vibecmd .dr { background:#ff5f57; }
  .vibecmd .dy { background:#febc2e; }
  .vibecmd .dg { background:#28c840; }
  .vibecmd span { font-size:11px; font-weight:700; color:rgba(0,255,136,0.4); letter-spacing:2px; font-family:'SF Mono',monospace; }
</style>
</head>
<body>
<div class="icon">
  <div class="blob blue"></div>
  <div class="blob green"></div>
  <div class="glass-card"></div>

  <!-- Floating glucose reading -->
  <div class="float-reading">
    <div class="val">112</div>
    <div class="unit">mg/dL</div>
  </div>

  <!-- Trend arrow -->
  <div class="float-trend">↗</div>

  <!-- Care circle status dots -->
  <div class="circle-dots">
    <div class="circle-dot on"></div>
    <div class="circle-dot on"></div>
    <div class="circle-dot warn"></div>
    <div class="circle-dot off"></div>
  </div>

  <svg class="loop-svg" viewBox="0 0 280 280" fill="none">
    <defs>
      <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7BB3FF"/><stop offset="50%" stop-color="#4A90D9"/><stop offset="100%" stop-color="#3A7BC8"/>
      </linearGradient>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5FE89D"/><stop offset="50%" stop-color="#34C759"/><stop offset="100%" stop-color="#2A9E47"/>
      </linearGradient>
      <filter id="gl"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    </defs>
    <g filter="url(#gl)"><rect x="44" y="82" width="120" height="116" rx="58" ry="58" stroke="url(#b)" stroke-width="16" fill="none"/></g>
    <g filter="url(#gl)"><rect x="116" y="82" width="120" height="116" rx="58" ry="58" stroke="url(#g)" stroke-width="16" fill="none"/></g>
    <rect x="128" y="74" width="20" height="24" fill="#0A0A0F" opacity="0.95" rx="2"/>
    <rect x="128" y="182" width="20" height="24" fill="#0A0A0F" opacity="0.95" rx="2"/>
    <line x1="128" y1="194" x2="148" y2="194" stroke="url(#g)" stroke-width="16" stroke-linecap="round"/>
    <line x1="128" y1="86" x2="148" y2="86" stroke="url(#b)" stroke-width="16" stroke-linecap="round"/>
  </svg>

  <div class="wordmark">LinkLoop</div>
  <div class="sub">Care · Track · Connect</div>

  <div class="vibecmd">
    <div class="td dr"></div><div class="td dy"></div><div class="td dg"></div>
    <span>VibeCMD</span>
  </div>
</div>
</body>
</html>
